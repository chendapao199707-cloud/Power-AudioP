<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>调音师在线工具箱</title>
    <script type="text/javascript">
      (function() {
        var l = window.location;
        // 核心修复逻辑：将 404 流量导回主页并带上路径信息
        var path = l.pathname.replace('/Power-Audio/', '');
        var newUrl = l.protocol + '//' + l.host + '/Power-Audio/?/' + path + (l.search ? '&' + l.search.slice(1) : '') + l.hash;
        l.replace(newUrl);
      })();
    </script>
  </head>
  <body>
  </body>
</html>
